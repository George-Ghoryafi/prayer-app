name: Daily Prayer Scrape

on:
  schedule:
    - cron: '0 11 * * *' # 6am ET (11 UTC)
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer@latest

      - name: Run scraper
        run: node scripts/scrape-daily-prayer.mjs

      - name: Commit daily prayer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/daily-prayer.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily prayer $(date -u +%Y-%m-%d)"
            git push
          fi
